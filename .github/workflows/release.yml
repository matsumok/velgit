name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Download pdfium
        shell: bash
        run: |
          curl -L "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7543/pdfium-win-x64.tgz" -o pdfium.tgz
          mkdir -p tmp_pdfium
          tar -xzf pdfium.tgz -C tmp_pdfium
          find tmp_pdfium -name "pdfium.dll"
          cp "$(find tmp_pdfium -name 'pdfium.dll' | head -1)" src-tauri/pdfium.dll

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: velgit ${{ github.ref_name }}
          releaseBody: |
            ## インストール方法
            - **インストーラー版**: `velgit_x.x.x_x64-setup.exe` をダウンロードして実行
            - **MSI版**: `velgit_x.x.x_x64_en-US.msi` をダウンロードして実行
          releaseDraft: true
          prerelease: false
