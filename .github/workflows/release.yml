name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Download pdfium
        shell: bash
        run: |
          curl -L "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7543/pdfium-win-x64.tgz" -o pdfium.tgz
          mkdir -p tmp_pdfium
          tar -xzf pdfium.tgz -C tmp_pdfium
          find tmp_pdfium -name "pdfium.dll"
          cp "$(find tmp_pdfium -name 'pdfium.dll' | head -1)" src-tauri/pdfium.dll

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "velgit ${{ github.ref_name }}" \
            --draft \
            --notes $'## インストール方法\n- **インストーラー版**: `velgit_*_x64-setup.exe` をダウンロードして実行\n- **MSI版**: `velgit_*_x64_en-US.msi` をダウンロードして実行' \
            src-tauri/target/release/bundle/nsis/velgit_*_x64-setup.exe \
            src-tauri/target/release/bundle/msi/velgit_*_x64_en-US.msi
